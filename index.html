<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 학생 선택과목 종합 대시보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root{
  --bg:#f8fafc; --surface:#fff; --surface-hover:#f1f5f9;
  --text-main:#0f172a; --text-muted:#64748b; --border:#e2e8f0;
  --accent:#3b82f6; --accent-glow:rgba(59,130,246,0.3);
  --live:#10b981; --violet:#7c3aed; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text-main);overflow-y:scroll}

.header-wrapper{position:sticky;top:0;background:rgba(248,250,252,0.9);backdrop-filter:blur(10px);z-index:100;border-bottom:1px solid var(--border);padding:12px 20px}
.header{max-width:1500px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.header h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px}
.header h1 .icon{-webkit-text-fill-color:initial}
.header-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);font-weight:700;flex-wrap:wrap}
.stats-badge{background:var(--surface);border:1px solid var(--border);padding:5px 10px;border-radius:8px;font-size:12px}
.sync-time{font-size:12px;color:var(--text-muted)}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:15px;transition:.2s;padding:0}
.icon-btn:hover{background:var(--surface-hover);transform:rotate(90deg)}

.controls{display:flex;gap:4px;background:var(--surface);padding:5px;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);flex-wrap:wrap;justify-content:center}
.btn{background:transparent;color:var(--text-muted);border:none;padding:9px 13px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}
.btn:hover{background:var(--surface-hover);color:var(--text-main)}
.btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px var(--accent-glow)}
.btn.sub{padding:7px 12px;font-size:13px;border:1px solid var(--border);background:var(--surface)}
.btn.sub.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.container{max-width:1500px;margin:0 auto;padding:32px 20px}
.tab-pane{display:none}
.tab-pane.active{display:block}

.search-wrapper{position:relative;width:100%;max-width:600px;margin:0 auto 24px}
.search-input{width:100%;padding:15px 18px 15px 42px;border-radius:14px;border:2px solid var(--border);font-size:15px;font-family:'Pretendard';font-weight:700;outline:none;transition:.2s;box-shadow:0 4px 10px rgba(0,0,0,0.02);background:var(--surface);color:var(--text-main)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow)}
.search-input::placeholder{color:#94a3b8}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-muted)}

.autocomplete-list{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;max-height:320px;overflow-y:auto;box-shadow:0 15px 35px rgba(0,0,0,0.12);z-index:50;display:none}
.autocomplete-item{padding:12px 18px;cursor:pointer;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;transition:.1s;display:flex;align-items:center;justify-content:space-between;gap:12px}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover,.autocomplete-item.highlight{background:#eff6ff;color:var(--accent)}

.grid-layout{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,0.03)}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(0,0,0,0.08);border-color:#cbd5e1}
.card.clickable{cursor:pointer}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.card-title{font-size:18px;font-weight:800;color:var(--text-main)}
.badge{font-size:12px;padding:4px 9px;border-radius:20px;background:#f1f5f9;color:#475569;font-weight:800;border:1px solid #e2e8f0;display:inline-block;white-space:nowrap}

.data-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
.data-table th,.data-table td{border:1px solid var(--border);padding:10px;text-align:center}
.data-table th{background:#f8fafc;font-weight:800;color:var(--text-main)}
.data-table td{font-weight:700;font-size:14px}
.date-input{width:100%;border:none;border-bottom:2px solid transparent;background:transparent;text-align:center;font-family:'Pretendard';font-weight:800;color:var(--text-main);font-size:14px;padding:4px;outline:none;transition:.2s}
.date-input:focus{border-color:var(--accent)}

.inline-error{color:var(--danger);font-weight:800;font-size:13px;margin-top:8px;padding:8px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;display:none}
.inline-error.show{display:block}

.slot-subtabs{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.slot-group{margin-bottom:28px}
.slot-group-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.slot-label{font-size:18px;font-weight:900;padding:6px 14px;border-radius:10px;color:#fff}
.slot-summary{font-size:13px;color:var(--text-muted);font-weight:700}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;justify-content:center}
.chip{padding:8px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-weight:700;font-size:13px;transition:.15s;font-family:inherit}
.chip:hover{background:var(--surface-hover)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.filter-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
.filter-bar label{display:block;font-weight:800;margin-bottom:6px;font-size:13px;color:var(--text-muted)}
.filter-bar select,.filter-bar input[type=text]{padding:11px 14px;border-radius:10px;border:2px solid var(--border);font-weight:700;font-size:14px;outline:none;background:var(--surface);color:var(--text-main);font-family:inherit}
.filter-bar select:focus,.filter-bar input[type=text]:focus{border-color:var(--accent)}

.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity .3s}
.spinner{width:44px;height:44px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}

.dist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:14px}
.dist-cell{padding:10px 12px;background:var(--surface-hover);border-radius:8px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:8px}
.dist-cell .subj{color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dist-cell .cnt{color:var(--accent);font-weight:900;flex-shrink:0}

.breakdown{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 18px;padding:12px;background:var(--surface-hover);border-radius:10px}
.breakdown-item{background:var(--surface);padding:5px 11px;border-radius:6px;font-size:13px;font-weight:700;border:1px solid var(--border)}
.breakdown-item strong{color:var(--accent)}

/* 숨은 하이퍼링크: 커서만 살짝 바꿔서 눌러볼 수 있게 */
[data-nav]{cursor:pointer}
[data-nav]:active{opacity:0.6}

/* 시간표 격자 */
.timetable{width:100%;border-collapse:separate;border-spacing:3px;table-layout:fixed;margin-bottom:22px}
.timetable th,.timetable td{padding:0;vertical-align:top}
.timetable thead th{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 4px;font-weight:800;font-size:14px;color:var(--text-main);text-align:center}
.timetable thead th.day-header{background:linear-gradient(135deg,#eff6ff,#ede9fe);font-size:15px}
.timetable td.period-label{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 4px;font-weight:800;font-size:13px;color:var(--text-muted);text-align:center;width:44px}
.tt-cell{min-height:68px;height:68px;border-radius:8px;padding:7px 8px;font-size:14px;line-height:1.3;border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:3px;overflow:hidden}
.tt-cell.empty{background:#fafbfc;border-style:dashed;border-color:#e5e7eb}
.tt-cell.has-slot{border-left-width:4px;border-left-style:solid}
.tt-cell .tt-subj{font-weight:800;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14.5px;width:100%;text-align:center}
.tt-cell .tt-sub{font-size:12.5px;color:var(--text-muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;justify-content:center;align-items:center;gap:6px;width:100%}
.tt-cell .tt-slot-badge{font-size:11px;padding:1px 6px;border-radius:4px;color:#fff;font-weight:900;flex-shrink:0}
.tt-cell.jayul{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.tt-cell.jaseup{background:#e0e7ff;border-color:#a5b4fc;color:#4338ca}
.tt-cell.clickable{cursor:pointer;transition:.15s}
.tt-cell.clickable:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,0.08)}

.tt-section-title{font-size:17px;font-weight:800;margin:18px 0 10px;color:var(--text-main);display:flex;align-items:center;gap:8px}

@media(max-width:640px){
  .timetable{font-size:12px}
  .tt-cell{min-height:60px;height:60px;padding:6px 5px}
  .tt-cell .tt-subj{font-size:13px}
  .tt-cell .tt-sub{font-size:11px}
}

/* 모바일 전용: 요일 탭 + 세로 리스트 */
.tt-mobile{display:none}
@media(max-width:640px){
  .timetable{display:none}
  .tt-mobile{display:block}
  .tt-day-tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--surface);padding:5px;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 6px rgba(0,0,0,.04)}
  .tt-day-tab{flex:1;background:transparent;border:none;padding:10px 0;border-radius:8px;font-weight:800;font-size:15px;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:.15s}
  .tt-day-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 10px var(--accent-glow)}
  .tt-day-list{display:flex;flex-direction:column;gap:6px}
  .tt-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--surface);border:1px solid var(--border);min-height:44px}
  .tt-row.empty{background:#fafbfc;border-style:dashed;border-color:#e5e7eb;color:#9ca3af;font-weight:700;font-size:13px;min-height:36px}
  .tt-row.has-slot{border-left-width:4px;border-left-style:solid}
  .tt-row.jayul{background:#fef3c7;border-color:#fcd34d;color:#92400e}
  .tt-row.jaseup{background:#e0e7ff;border-color:#a5b4fc;color:#4338ca}
  .tt-row-period{font-weight:900;font-size:13px;color:var(--text-muted);min-width:36px;flex-shrink:0}
  .tt-row.jayul .tt-row-period,.tt-row.jaseup .tt-row-period{color:inherit}
  .tt-row-body{flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0}
  .tt-row-subj{font-weight:800;font-size:15px;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tt-row.jayul .tt-row-subj,.tt-row.jaseup .tt-row-subj{color:inherit}
  .tt-row-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .tt-row-teacher{font-size:13px;color:var(--text-muted);font-weight:700}
  .tt-row-slot{font-size:11px;padding:2px 6px;border-radius:4px;color:#fff;font-weight:900}
}

@media(max-width:640px){
  .header h1{font-size:19px}
  .container{padding:20px 14px}
  .card-title{font-size:17px}
}

@media print{
  body{background:#fff;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .header-wrapper,.controls,.search-wrapper,.no-print,.slot-subtabs,.chip-row,.filter-bar{display:none!important}
  .container{padding:0!important;margin:0!important;max-width:100%}
  .tab-pane{display:none!important}
  .tab-pane.active{display:block!important}
  .card{box-shadow:none!important;border:none!important;padding:0!important;margin:0!important;border-radius:0!important;background:transparent!important}
  @page{size:A4 landscape;margin:8mm}
  .data-table{border-radius:0!important;overflow:visible!important;table-layout:fixed;width:100%;border-collapse:collapse!important}
  .data-table th,.data-table td{border:1px solid #000!important;padding:4px 2px!important;font-size:10.5pt!important;line-height:1.1!important;color:#000!important;height:22px!important}
  .data-table th{background:#f0f0f0!important}
  .date-input{border:none!important;font-size:10pt!important;color:#000!important;text-align:center;width:100%;padding:0;height:auto!important}
  .date-input::placeholder{color:transparent!important}
  .print-header{margin-bottom:5px!important;padding-top:0!important}
  .print-header h2{font-size:17pt!important;margin-bottom:4px!important;margin-top:0!important}
  .print-header div{font-size:12pt!important;margin-bottom:5px!important}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-weight:900;font-size:18px;color:var(--text-main)" id="loadingMsg">스프레드시트에서 데이터를 불러오는 중...</div>
</div>

<div class="header-wrapper no-print">
  <div class="header">
    <div class="header-left">
      <h1><span class="icon">📋</span> 학생 선택과목 대시보드</h1>
      <div class="header-meta">
        <span class="stats-badge" id="statsBadge">—</span>
        <span class="sync-time" id="syncTime"></span>
        <button class="icon-btn" id="refreshBtn" title="새로고침">🔄</button>
      </div>
    </div>
    <div class="controls">
      <button class="btn active" id="btn_student">👨‍🎓 학생</button>
      <button class="btn" id="btn_slot">🗂️ 슬롯별</button>
      <button class="btn" id="btn_class">🏫 반별</button>
      <button class="btn" id="btn_roster">📝 명렬표</button>
      <button class="btn" id="btn_teacher">🧑‍🏫 교사시간표</button>
      <button class="btn" id="btn_location">📍 수업장소</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="tab_student" class="tab-pane active"></div>
  <div id="tab_slot" class="tab-pane"></div>
  <div id="tab_class" class="tab-pane"></div>
  <div id="tab_roster" class="tab-pane"></div>
  <div id="tab_teacher" class="tab-pane"></div>
  <div id="tab_location" class="tab-pane"></div>
</div>

<script>
/* ============================================================
   상수 & 유틸
   ============================================================ */
const SHEET_ID = '1ZwOdHmsFGbCNTDJtUvLk5ExLxgLCAXyTVglkULv99lQ';
const SC = {"A":"#ef4444","B":"#f97316","C":"#eab308","D":"#22c55e","E":"#3b82f6","F":"#ef4444","G":"#f97316","H":"#8b5cf6","I":"#06b6d4","J":"#14b8a6","K":"#a855f7","L":"#ec4899","M":"#6366f1","N":"#0ea5e9","O":"#dc2626","P":"#ea580c","Q":"#ca8a04","R":"#16a34a","S":"#0891b2","T":"#2563eb","U":"#7c3aed","V":"#c026d3","W":"#db2777"};

function escapeHtml(str){
  if(str==null) return '';
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function debounce(fn, ms){
  let t;
  return function(...args){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args), ms); };
}
function slotColor(s){ return SC[s] || SC[(s||'').charAt(0)] || 'var(--accent)'; }
function findClassroom(grade, slot, subject){
  return classroomData.find(c => c.grade===grade && c.slot===slot && c.subject===subject);
}
function formatRelativeTime(ts){
  if(!ts) return '';
  const diff = Math.floor((Date.now()-ts)/1000);
  if(diff < 10) return '방금 전';
  if(diff < 60) return diff+'초 전';
  if(diff < 3600) return Math.floor(diff/60)+'분 전';
  return Math.floor(diff/3600)+'시간 전';
}

/* ============================================================
   상태
   ============================================================ */
let allStudents = [];
let classroomData = [];
let scheduleData = [];     // 반별시간표: {grade, ban, day, period, subject, teacher, slot}
let slotTimeMap = [];      // 슬롯시간매핑: {grade, slot, day, period}
let dataLoaded = 0;
let lastLoadTime = null;
let errorTimeout = null;
const TOTAL = 6;
const renderedTabs = new Set();

/* ============================================================
   파싱 (원본 유지)
   ============================================================ */
function parseStudentSheet(data, gradeStr) {
    if (!data?.table) return;
    const cols = data.table.cols || [];
    const rows = data.table.rows || [];
    const headers = cols.map(c => (c.label || '').trim());

    let idIdx = headers.findIndex(h => h.includes('학번'));
    let nameIdx = headers.findIndex(h => h.includes('이름') || h.includes('성명'));
    if (idIdx === -1) idIdx = 0;
    if (nameIdx === -1) nameIdx = 1;

    const subjectCols = [];
    headers.forEach((h, j) => {
        if (j === idIdx || j === nameIdx || !h) return;
        subjectCols.push({ idx: j, name: h });
    });

    for (const row of rows) {
        if (!row.c) continue;
        const idCell = row.c[idIdx];
        const nameCell = row.c[nameIdx];
        const id = idCell ? String(idCell.f || idCell.v || '').trim() : '';
        const name = nameCell ? String(nameCell.v || '').trim() : '';
        if (!id || !name) continue;

        let homeroom = '미정';
        const m = id.match(/^(\d)(\d{2})(\d{2})$/);
        if (m) homeroom = `${m[1]}학년 ${parseInt(m[2])}반`;

        const subjects = {};
        for (const sc of subjectCols) {
            const cell = row.c[sc.idx];
            if (!cell || cell.v === null || cell.v === undefined) continue;
            const val = String(cell.v).trim();
            if (val && val !== '-' && val !== '0') {
                subjects[sc.name] = val;
            }
        }
        if (Object.keys(subjects).length > 0) {
            allStudents.push({ id, name, grade: gradeStr, homeroom, subjects });
        }
    }
}

function parseClassroomSheet(data, gradeStr) {
    if (!data?.table) return;
    const cols = data.table.cols || [];
    const rows = data.table.rows || [];

    const subjectMap = {};
    for (let j = 2; j < cols.length; j++) {
        const label = (cols[j].label || '').trim();
        if (label) subjectMap[j] = label;
    }

    let currentSlot = '';

    for (const row of rows) {
        if (!row.c) continue;
        const getVal = (idx) => {
            const cell = row.c[idx];
            if (!cell || cell.v === null || cell.v === undefined) return '';
            return String(cell.f || cell.v).trim();
        };

        const colA = getVal(0);
        const colB = getVal(1);

        if (colB === '학생수' && colA) {
            currentSlot = colA;
            for (let j = 2; j < row.c.length; j++) {
                const cnt = parseInt(getVal(j));
                const subj = subjectMap[j];
                if (!isNaN(cnt) && cnt > 0 && subj) {
                    classroomData.push({ grade: gradeStr, slot: currentSlot, subject: subj, teacher: '', room: '', count: cnt });
                }
            }
            continue;
        }

        if (colB === '담당교사' && currentSlot) {
            for (let j = 2; j < row.c.length; j++) {
                const teacher = getVal(j);
                const subj = subjectMap[j];
                if (teacher && subj) {
                    const e = classroomData.find(x => x.grade === gradeStr && x.slot === currentSlot && x.subject === subj);
                    if (e) e.teacher = teacher;
                }
            }
            continue;
        }

        if (colB === '교실' && currentSlot) {
            for (let j = 2; j < row.c.length; j++) {
                const room = getVal(j);
                const subj = subjectMap[j];
                if (room && subj) {
                    const e = classroomData.find(x => x.grade === gradeStr && x.slot === currentSlot && x.subject === subj);
                    if (e) e.room = room;
                }
            }
            continue;
        }
    }
}

/* 반별시간표: 학년·반·요일·교시·과목·교사·슬롯 */
function parseSchedule(data){
  if(!data?.table) return;
  const cols = data.table.cols || [];
  const rows = data.table.rows || [];
  const labels = cols.map(c => (c.label || '').trim());

  const idx = name => labels.findIndex(l => l === name);
  const iGrade   = idx('학년');
  const iBan     = idx('반');
  const iDay     = idx('요일');
  const iPeriod  = idx('교시');
  const iSubject = idx('과목');
  const iTeacher = idx('교사');
  const iSlot    = idx('슬롯');

  for(const row of rows){
    if(!row.c) continue;
    const getV = i => {
      if(i < 0) return '';
      const c = row.c[i];
      if(!c || c.v === null || c.v === undefined) return '';
      return String(c.f || c.v).trim();
    };
    const grade   = parseInt(getV(iGrade));
    const ban     = parseInt(getV(iBan));
    const day     = getV(iDay);
    const period  = parseInt(getV(iPeriod));
    const subject = getV(iSubject);
    const teacher = getV(iTeacher);
    const slot    = getV(iSlot);
    if(!grade || !ban || !day || !period || !subject) continue;
    scheduleData.push({ grade, ban, day, period, subject, teacher, slot });
  }
}

/* 슬롯시간매핑: 학년·슬롯·요일·교시 */
function parseSlotTimes(data){
  if(!data?.table) return;
  const cols = data.table.cols || [];
  const rows = data.table.rows || [];
  const labels = cols.map(c => (c.label || '').trim());
  const idx = name => labels.findIndex(l => l === name);
  const iGrade  = idx('학년');
  const iSlot   = idx('슬롯');
  const iDay    = idx('요일');
  const iPeriod = idx('교시');

  for(const row of rows){
    if(!row.c) continue;
    const getV = i => {
      if(i < 0) return '';
      const c = row.c[i];
      if(!c || c.v === null || c.v === undefined) return '';
      return String(c.f || c.v).trim();
    };
    const grade = parseInt(getV(iGrade));
    const slot = getV(iSlot);
    const day = getV(iDay);
    const period = parseInt(getV(iPeriod));
    if(!grade || !slot || !day || !period) continue;
    slotTimeMap.push({ grade, slot, day, period });
  }
}

    currentMatches = allStudents.filter(s => s.name.toLowerCase().includes(val) || s.id.includes(val)).slice(0,20);

  dd.addEventListener('click', e=>{

    if(item) selectStudent(item.dataset.id);
  });

  document.addEventListener('click', e=>{
    if(e.target !== input && !dd.contains(e.target)) dd.style.display='none';
  });
}

/* ============================================================
   시간표 격자 헬퍼
   ============================================================ */
const DAYS = ['월','화','수','목','금'];

function maxPeriodOf(entries){
  let max = 5;
  entries.forEach(e => { if(e.period > max) max = e.period; });
  if(max < 5) max = 5;
  if(max > 9) max = 9;
  return max;
}

function renderTimetableGrid(entries, opts){
  // entries: [{day, period, subject, teacher, slot, ...}, ...]
  opts = opts || {};
  const maxP = maxPeriodOf(entries);
  const grid = {};
  entries.forEach(e=>{
    const k = `${e.day}|${e.period}`;
    if(!grid[k]) grid[k] = [];
    grid[k].push(e);
  });

  const pick = (cells) => {
    if(!cells || !cells.length) return null;
    if(opts.highlightStudentSubjects){
      const picks = cells.filter(e=>{
        if(!e.slot) return true;
        return opts.highlightStudentSubjects[e.subject] === e.slot;
      });
      return picks[0] || null;
    }
    return cells[0];
  };

  // === 데스크톱: 격자 ===
  let h = `<table class="timetable"><thead><tr><th></th>`;
  DAYS.forEach(d => { h += `<th class="day-header">${d}</th>`; });
  h += `</tr></thead><tbody>`;
  for(let p=1; p<=maxP; p++){
    h += `<tr><td class="period-label">${p}교시</td>`;
    DAYS.forEach(d=>{
      const chosen = pick(grid[`${d}|${p}`]);
      if(!chosen){ h += `<td><div class="tt-cell empty"></div></td>`; return; }
      h += `<td>${renderTimetableCell(chosen, opts)}</td>`;
    });
    h += `</tr>`;
  }
  h += `</tbody></table>`;

  // === 모바일: 요일 탭 + 세로 리스트 ===
  const tabId = 'ttm_' + Math.random().toString(36).slice(2, 8);
  let m = `<div class="tt-mobile" data-tab-id="${tabId}">`;
  m += `<div class="tt-day-tabs">`;
  DAYS.forEach((d, i) => {
    m += `<button class="tt-day-tab${i===0?' active':''}" data-day="${d}">${d}</button>`;
  });
  m += `</div>`;
  DAYS.forEach((d, i) => {
    m += `<div class="tt-day-list" data-day-list="${d}" style="${i===0?'':'display:none'}">`;
    let anyRow = false;
    for(let p=1; p<=maxP; p++){
      const chosen = pick(grid[`${d}|${p}`]);
      if(!chosen){
        m += `<div class="tt-row empty"><span class="tt-row-period">${p}교시</span><span>—</span></div>`;
        continue;
      }
      anyRow = true;
      m += renderTimetableRow(p, chosen, opts);
    }
    if(!anyRow){
      // 전체가 empty인 요일은 간단히 표시
    }
    m += `</div>`;
  });
  m += `</div>`;

  return h + m;
}

function renderTimetableRow(period, e, opts){
  opts = opts || {};
  if(e.subject === '자율활동'){
    return `<div class="tt-row jayul"><span class="tt-row-period">${period}교시</span><div class="tt-row-body"><span class="tt-row-subj">자율활동</span></div></div>`;
  }
  if(e.subject === '자습'){
    return `<div class="tt-row jaseup"><span class="tt-row-period">${period}교시</span><div class="tt-row-body"><span class="tt-row-subj">자습</span></div></div>`;
  }
  const col = e.slot ? slotColor(e.slot) : '#94a3b8';
  const slotClass = e.slot ? ' has-slot' : '';

  const teacherNav = e.teacher
    ? `<span data-nav="teacher" data-arg1="${escapeHtml(e.teacher)}">${escapeHtml(e.teacher)}</span>`
    : '';
  const banNav = opts.showBan
    ? `<span data-nav="class" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.ban)}">${escapeHtml(e.grade)}-${escapeHtml(e.ban)}반</span>`
    : '';
  const metaInner = opts.showBan
    ? (teacherNav ? `${banNav} · ${teacherNav}` : banNav)
    : teacherNav;

  const slotBadgeHtml = e.slot
    ? `<span class="tt-row-slot" style="background:${col}" data-nav="slot" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.slot)}">${escapeHtml(e.slot)}</span>`
    : '';

  let subjNav = '';
  if(e.navOverride === 'slot' && e.grade && e.slot){
    subjNav = `data-nav="slot" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.slot)}"`;
  } else if(e.slot && e.grade){
    subjNav = `data-nav="roster" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.slot)}" data-arg3="${escapeHtml(e.subject)}"`;
  } else if(e.grade && e.ban){
    subjNav = `data-nav="class" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.ban)}"`;
  }

  return `
    <div class="tt-row${slotClass}" style="${e.slot?`border-left-color:${col};`:''}">
      <span class="tt-row-period">${period}교시</span>
      <div class="tt-row-body">
        <span class="tt-row-subj" ${subjNav}>${escapeHtml(e.subject)}</span>
        <div class="tt-row-meta">
          ${metaInner?`<span class="tt-row-teacher">${metaInner}</span>`:''}
          ${slotBadgeHtml}
        </div>
      </div>
    </div>`;
}

function renderTimetableCell(e, opts){
  opts = opts || {};
  if(e.subject === '자율활동'){
    return `<div class="tt-cell jayul"><div class="tt-subj">자율활동</div></div>`;
  }
  if(e.subject === '자습'){
    return `<div class="tt-cell jaseup"><div class="tt-subj">자습</div></div>`;
  }
  const col = e.slot ? slotColor(e.slot) : '#94a3b8';
  const slotClass = e.slot ? ' has-slot' : '';
  const teacherNav = e.teacher
    ? `<span data-nav="teacher" data-arg1="${escapeHtml(e.teacher)}">${escapeHtml(e.teacher)}</span>`
    : '';
  const banNav = opts.showBan
    ? `<span data-nav="class" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.ban)}">${escapeHtml(e.grade)}-${escapeHtml(e.ban)}반</span>`
    : '';
  const subLine = opts.showBan
    ? (teacherNav ? `${banNav} · ${teacherNav}` : banNav)
    : teacherNav;
  const slotBadgeHtml = e.slot
    ? `<span class="tt-slot-badge" style="background:${col}" data-nav="slot" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.slot)}">${escapeHtml(e.slot)}</span>`
    : '';
  // 과목명은 선택과목이면 명렬표로, 공통수업이면 반별 조회로
  let subjNav = '';
  if(e.navOverride === 'slot' && e.grade && e.slot){
    subjNav = `data-nav="slot" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.slot)}"`;
  } else if(e.slot && e.grade){
    subjNav = `data-nav="roster" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.slot)}" data-arg3="${escapeHtml(e.subject)}"`;
  } else if(e.grade && e.ban){
    subjNav = `data-nav="class" data-arg1="${escapeHtml(e.grade)}" data-arg2="${escapeHtml(e.ban)}"`;
  }
  return `
    <div class="tt-cell${slotClass}" style="${e.slot?`border-left-color:${col};`:''}">
      <div class="tt-subj" ${subjNav}>${escapeHtml(e.subject)}</div>
      <div class="tt-sub"><span>${subLine}</span>${slotBadgeHtml}</div>
    </div>`;
}

function buildStudentTimetable(student){
  const grade = parseInt(student.grade);  // "3학년" → 3
  const banM = student.homeroom.match(/(\d+)반/);
  const ban = banM ? parseInt(banM[1]) : null;
  if(!grade || !ban) return '';

  const entries = [];

  // 1) 공통과목 / 자율 / 자습: 반별시간표에서 슬롯 없는 행만
  scheduleData
    .filter(r => r.grade === grade && r.ban === ban && !r.slot)
    .forEach(r => entries.push({ ...r }));

  // 2) 선택과목: 학생의 과목·슬롯 + slotTimeMap 시간 조합
  //    슬롯이 'W2' 처럼 숫자 붙어있으면 첫 글자로 시간 조회 (같은 시간대 분반)
  Object.entries(student.subjects).forEach(([subj, slotRaw]) => {
    const baseSlot = (slotRaw || '').charAt(0);
    if(!baseSlot) return;
    const ci = findClassroom(student.grade, slotRaw, subj);
    const teacher = ci?.teacher || '';
    slotTimeMap
      .filter(t => t.grade === grade && t.slot === baseSlot)
      .forEach(t => {
        entries.push({
          grade, ban,
          day: t.day, period: t.period,
          subject: subj, teacher, slot: slotRaw
        });
      });
  });

  if(!entries.length){
    return `<div style="margin:14px 0;padding:14px;background:#fef3c7;border:1px solid #fde68a;border-radius:10px;font-weight:700;color:#92400e;">⚠️ 시간표 데이터 없음 (${grade}학년 ${ban}반)</div>`;
  }
  const grid = renderTimetableGrid(entries, {});
  return `<div class="tt-section-title">📅 주간 시간표</div>${grid}`;
}

   슬롯별 탭 (2학년/3학년 분리)

let slotTabGrade = '2학년';
function renderSlotTab(c){
  c.innerHTML = `
    <div style="text-align:center;margin-bottom:20px;">
      <h2 style="font-weight:900;margin-bottom:14px;font-size:26px;">🗂️ 슬롯별 강좌 보기</h2>
    </div>
    <div class="slot-subtabs no-print">
      <button class="btn sub active" data-grade="2학년">2학년</button>
      <button class="btn sub" data-grade="3학년">3학년</button>
    </div>
    <div id="slotContent"></div>`;
  c.querySelectorAll('.slot-subtabs .btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      c.querySelectorAll('.slot-subtabs .btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      slotTabGrade = b.dataset.grade;
      renderSlotContent();
    });
  });
  renderSlotContent();
}

function renderSlotContent(){
  const container = document.getElementById('slotContent');
  if(!container) return;
  const grade = slotTabGrade;
  const gradeNum = parseInt(grade);
  const items = classroomData.filter(c=>c.grade===grade);
  if(!items.length){
    container.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:40px;font-weight:700;">${escapeHtml(grade)} 데이터 없음</div>`;
    return;
  }
  const bySlot = {};
  items.forEach(it=>{
    if(!bySlot[it.slot]) bySlot[it.slot] = [];
    bySlot[it.slot].push(it);
  });
  const slots = Object.keys(bySlot).sort();
  const dayOrder = {'월':0,'화':1,'수':2,'목':3,'금':4};

  let h = '';
  slots.forEach(slot=>{
    const col = slotColor(slot);
    const list = bySlot[slot];
    const total = list.reduce((sum,x)=>sum+(x.count||0), 0);
    // 슬롯 시간 조회
    const times = slotTimeMap
      .filter(t => t.grade === gradeNum && t.slot === slot)
      .sort((a,b) => (dayOrder[a.day] - dayOrder[b.day]) || (a.period - b.period))
      .map(t => `${t.day}${t.period}`);
    const timesHtml = times.length
      ? `<span class="slot-summary" style="background:${col}15;color:${col};padding:3px 9px;border-radius:6px;">🕒 ${times.join(' · ')}</span>`
      : '';
    h += `
      <div class="slot-group" data-slot="${escapeHtml(slot)}">
        <div class="slot-group-header">
          <span class="slot-label" style="background:${col};">슬롯 ${escapeHtml(slot)}</span>
          <span class="slot-summary">${list.length}개 강좌 · 총 ${total}명</span>
          ${timesHtml}
        </div>
        <div class="grid-layout">`;
    list.forEach(it=>{
      h += `
        <div class="card clickable" data-nav="roster" data-arg1="${escapeHtml(it.grade)}" data-arg2="${escapeHtml(it.slot)}" data-arg3="${escapeHtml(it.subject)}" style="border-left:4px solid ${col};">
          <div class="card-title" style="margin-bottom:10px;">${escapeHtml(it.subject)}</div>
          <div style="font-size:13px;color:var(--text-muted);font-weight:700;line-height:1.8;">
            <div>🧑‍🏫 <span data-nav="teacher" data-arg1="${escapeHtml(it.teacher||'')}">${escapeHtml(it.teacher||'미정')}</span></div>
            <div>📍 ${escapeHtml(it.room||'미정')} · 👥 ${it.count||0}명</div>
          </div>
          <div style="margin-top:10px;font-size:12px;color:${col};font-weight:800;">→ 명렬표 보기</div>
        </div>`;
    });
    h += `</div></div>`;
  });
  container.innerHTML = h;
}

let classTabGrade = '2학년';
let classTabRoom = null;
function renderClassTab(c){
  c.innerHTML = `
    <div style="text-align:center;margin-bottom:20px;">
      <h2 style="font-weight:900;margin-bottom:14px;font-size:26px;">🏫 반별 조회</h2>
    </div>
    <div class="slot-subtabs no-print">
      <button class="btn sub active" data-grade="2학년">2학년</button>
      <button class="btn sub" data-grade="3학년">3학년</button>
    </div>
    <div id="classRoomChips" class="chip-row no-print"></div>

  c.querySelectorAll('.slot-subtabs .btn').forEach(b=>{

      c.querySelectorAll('.slot-subtabs .btn').forEach(x=>x.classList.remove('active'));

      classTabGrade = b.dataset.grade;
      classTabRoom = null;
      renderClassChips();
      renderClassContent();
    });
  });
  renderClassChips();
  renderClassContent();
}
function renderClassChips(){
  const rooms = [...new Set(allStudents.filter(s=>s.grade===classTabGrade).map(s=>s.homeroom))].sort((a,b)=>{
    const na = parseInt(a.match(/(\d+)반/)?.[1]||0);
    const nb = parseInt(b.match(/(\d+)반/)?.[1]||0);
    return na-nb;
  });
  const host = document.getElementById('classRoomChips');
  if(!host) return;
  host.innerHTML = rooms.map(r=>`<button class="chip${r===classTabRoom?' active':''}" data-room="${escapeHtml(r)}">${escapeHtml(r)}</button>`).join('');
  host.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click', ()=>{
      classTabRoom = ch.dataset.room;
      renderClassChips();
      renderClassContent();
    });
  });
}
function renderClassContent(){
  const host = document.getElementById('classContent');
  if(!host) return;
  if(!classTabRoom){
    host.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:30px;font-weight:700;">위에서 반을 선택해주세요.</div>`;
    return;
  }
  const banM = classTabRoom.match(/(\d+)반/);
  const gradeNum = parseInt(classTabGrade);
  const ban = banM ? parseInt(banM[1]) : null;

  const sts = allStudents.filter(s=>s.grade===classTabGrade && s.homeroom===classTabRoom).sort((a,b)=>a.id.localeCompare(b.id));

  // 반별 시간표 데이터 구성: 반별시간표 + 슬롯별 선택과목 매핑
  const entries = [];
  // 공통/자율/자습
  scheduleData
    .filter(r => r.grade === gradeNum && r.ban === ban && !r.slot)
    .forEach(r => entries.push({ ...r }));
  // 선택과목: 해당 반의 slotTimeMap 시간대에 "(선택)" 표시
  const slotsInGrade = [...new Set(slotTimeMap.filter(t=>t.grade===gradeNum).map(t=>t.slot))];
  slotsInGrade.forEach(slot => {
    slotTimeMap
      .filter(t => t.grade === gradeNum && t.slot === slot)
      .forEach(t => {
        entries.push({
          grade: gradeNum, ban,
          day: t.day, period: t.period,
          subject: `선택 (슬롯 ${slot})`,
          teacher: '',
          slot,
          navOverride: 'slot'  // 과목명이 실제가 아니므로 슬롯 탭으로
        });
      });
  });

  const gridHtml = (gradeNum && ban && entries.length)
    ? renderTimetableGrid(entries, {})
    : `<div style="text-align:center;padding:30px;color:var(--text-muted);font-weight:700;">시간표 데이터 없음</div>`;

  let h = `
    <div class="card" style="margin-bottom:18px;">
      <div class="card-header">
        <div class="card-title">📅 ${escapeHtml(classTabRoom)} 주간 시간표 <span class="badge">${sts.length}명</span></div>
      </div>
      <div style="margin-top:14px;">${gridHtml}</div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:14px;">👥 학생 목록</div>
      <div class="grid-layout">
        ${sts.map(s=>{
          const n = Object.keys(s.subjects).length;
          return `
            <div class="card clickable" data-nav="student" data-arg1="${escapeHtml(s.id)}" style="padding:14px;border-left:4px solid var(--accent);">
              <div style="font-size:16px;font-weight:900;margin-bottom:4px;">${escapeHtml(s.name)}</div>
              <div style="font-size:12px;color:var(--text-muted);font-weight:700;">${escapeHtml(s.id)} · 수강 ${n}과목</div>
            </div>`;
        }).join('') || '<div style="color:var(--text-muted);font-weight:700;">학생 없음</div>'}
      </div>
    </div>`;
  host.innerHTML = h;
}

function renderRosterTab(c){
  const combos = new Set();
  allStudents.forEach(s=>Object.entries(s.subjects).forEach(([sj,sl])=>combos.add(`${s.grade}::${sl}::${sj}`)));
  const cl = [...combos].sort();

  c.innerHTML = `
    <div class="card no-print" style="margin-bottom:24px;">
      <div class="card-title" style="margin-bottom:16px;">📝 과목별 명렬표 및 출석부</div>
      <div class="filter-bar">
        <div style="flex:1;min-width:260px;">
          <label>📚 강좌 선택</label>
          <select id="rosterSelect" style="width:100%;">
            <option value="">강좌를 선택해주세요...</option>
            ${cl.map(c=>{
              const [g,s,j] = c.split('::');
              const ci = findClassroom(g,s,j);
              return `<option value="${escapeHtml(c)}">[${escapeHtml(g)}] 슬롯 ${escapeHtml(s)} · ${escapeHtml(j)}${ci?.teacher?' ('+escapeHtml(ci.teacher)+')':''}</option>`;
            }).join('')}
          </select>
        </div>
        <div>
          <label>📅 열 수</label>
          <input type="text" inputmode="numeric" id="rosterCols" value="10" style="width:90px;text-align:center;">
        </div>
        <div>
          <label>🏷️ 헤더 형식</label>
          <select id="rosterHeaderType">
            <option value="date">날짜 (연도-월-일)</option>
            <option value="perf">수행평가 (1,2,3...)</option>
            <option value="unit">단원 (1,2,3...)</option>
            <option value="blank">자유 입력</option>
          </select>
        </div>
        <div>
          <button class="btn active" style="padding:12px 18px;" id="rosterPrintBtn">🖨️ 인쇄</button>
        </div>
      </div>
      <div class="inline-error" id="rosterError"></div>
    </div>
    <div id="rosterResult"></div>`;

  const sel = document.getElementById('rosterSelect');
  const cols = document.getElementById('rosterCols');
  const hdr = document.getElementById('rosterHeaderType');
  sel.addEventListener('change', generateRoster);
  hdr.addEventListener('change', generateRoster);
  cols.addEventListener('input', debounce(generateRoster, 200));
  document.getElementById('rosterPrintBtn').addEventListener('click', ()=>{
    if(!sel.value){
      const err = document.getElementById('rosterError');
      err.textContent = '⚠️ 강좌를 먼저 선택해주세요.';
      err.classList.add('show');
      setTimeout(()=>err.classList.remove('show'), 3000);
      return;
    }
    window.print();
  });
}

function jumpToRoster(grade, slot, subject){
  switchTab('roster');
  const sel = document.getElementById('rosterSelect');
  if(sel){
    sel.value = `${grade}::${slot}::${subject}`;
    generateRoster();
  }
}

function generateRoster(){
  const sel = document.getElementById('rosterSelect');
  const colsEl = document.getElementById('rosterCols');
  const hdrEl = document.getElementById('rosterHeaderType');
  const err = document.getElementById('rosterError');
  const out = document.getElementById('rosterResult');
  if(!sel || !out) return;
  err.classList.remove('show');

  if(!sel.value){ out.innerHTML = ''; return; }

  const [g, sl, sj] = sel.value.split('::');
  let cols = parseInt(colsEl.value);
  if(isNaN(cols) || cols < 1) cols = 1;
  if(cols > 30) cols = 30;
  const hdrType = hdrEl.value;

  const sts = allStudents.filter(s=>s.grade===g && s.subjects[sj]===sl).sort((a,b)=>a.id.localeCompare(b.id));
  const ci = findClassroom(g, sl, sj) || {};

  const byRoom = {};
  sts.forEach(s=>{ byRoom[s.homeroom] = (byRoom[s.homeroom]||0)+1; });
  const roomEntries = Object.entries(byRoom).sort();

  function hdrCell(i){
    if(hdrType === 'date') return `<input type="text" class="date-input" placeholder="연도-월-일">`;
    if(hdrType === 'perf') return `<input type="text" class="date-input" value="수행${i+1}">`;
    if(hdrType === 'unit') return `<input type="text" class="date-input" value="${i+1}단원">`;
    return `<input type="text" class="date-input" placeholder="항목명">`;
  }

  let h = `
    <div class="card" style="padding:0;overflow-x:auto;">
      <div class="print-header" style="text-align:center;margin-bottom:12px;padding-top:10px;">
        <h2 style="font-size:22px;font-weight:900;margin-bottom:6px;">📋 [${escapeHtml(g)}] ${escapeHtml(sj)} 출석부 (슬롯 ${escapeHtml(sl)})</h2>
        <div style="font-size:15px;font-weight:800;color:var(--text-main);margin-bottom:8px;">🧑‍🏫 <span data-nav="teacher" data-arg1="${escapeHtml(ci.teacher||'')}">${escapeHtml(ci.teacher||'미정')}</span> 선생님</div>
        <div style="display:inline-flex;gap:12px;background:var(--surface-hover);padding:7px 18px;border-radius:12px;font-weight:700;color:var(--text-muted);font-size:13px;" class="no-print">
          <span>📍 ${escapeHtml(ci.room||'미정')}</span>
          <span style="color:var(--accent);">총 ${sts.length}명</span>
        </div>
      </div>
      <div class="breakdown no-print">
        <span style="font-weight:800;color:var(--text-muted);margin-right:4px;">반별 분포:</span>
        ${roomEntries.map(([room,cnt])=>{
          const bMatch = room.match(/(\d+)반/);
          const bNum = bMatch ? bMatch[1] : '';
          return `<span class="breakdown-item" data-nav="class" data-arg1="${escapeHtml(g)}" data-arg2="${bNum}">${escapeHtml(room)} <strong>${cnt}명</strong></span>`;
        }).join('') || '<span style="color:var(--text-muted)">—</span>'}
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:40px;font-size:13px;">연번</th>
            <th style="width:65px;font-size:13px;">학번</th>
            <th style="width:80px;font-size:13px;">이름</th>`;
  for(let i=0;i<cols;i++) h += `<th style="padding:2px;">${hdrCell(i)}</th>`;
  h += `</tr></thead><tbody>`;
  if(!sts.length){
    h += `<tr><td colspan="${cols+3}" style="padding:30px;color:var(--text-muted);">수강생 없음</td></tr>`;
  } else {
    sts.forEach((s,i)=>{
      h += `<tr>
        <td style="font-size:12px;color:var(--text-muted);">${i+1}</td>
        <td style="font-size:12px;">${escapeHtml(s.id)}</td>
        <td style="font-weight:900;font-size:14px;text-align:center;" data-nav="student" data-arg1="${escapeHtml(s.id)}">${escapeHtml(s.name)}</td>`;
      for(let j=0;j<cols;j++) h += `<td></td>`;
      h += `</tr>`;
    });
  }
  h += `</tbody></table></div>`;
  out.innerHTML = h;
}

function renderTeacherTimetable(teacher){
  const out = document.getElementById('teacherResult');
  const entries = scheduleData.filter(r => r.teacher === teacher);
  if(!entries.length){
    out.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);font-weight:700;">해당 교사의 시간표 데이터가 없습니다.</div>`;
    return;
  }

  // 요약 통계
  const classesTaught = [...new Set(entries.map(e=>`${e.grade}-${e.ban}`))].sort();
  const subjects = [...new Set(entries.map(e=>e.subject))].sort();
  const totalHours = entries.length;

  // 격자
  const grid = renderTimetableGrid(entries, { showBan: true });

  out.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;padding:16px 22px;background:linear-gradient(135deg,#eff6ff,#ede9fe);border-radius:16px;">
      <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;flex-shrink:0;">${escapeHtml(teacher.charAt(0))}</div>
      <div style="flex:1;">
        <div style="font-size:20px;font-weight:900;">${escapeHtml(teacher)} 선생님</div>
        <div style="font-size:13px;color:var(--text-muted);font-weight:600;margin-top:4px;">
          주 ${totalHours}시간 · ${classesTaught.length}개 학급 · ${subjects.length}개 과목
        </div>
      </div>
    </div>
    <div class="breakdown">
      <span style="font-weight:800;color:var(--text-muted);margin-right:4px;">담당 학급:</span>
      ${classesTaught.map(key=>{
        const [g,b] = key.split('-');
        return `<span class="breakdown-item" data-nav="class" data-arg1="${escapeHtml(g)}" data-arg2="${escapeHtml(b)}">${escapeHtml(key)}반</span>`;
      }).join('')}
    </div>
    <div class="breakdown">
      <span style="font-weight:800;color:var(--text-muted);margin-right:4px;">과목:</span>
      ${subjects.map(s=>`<span class="breakdown-item">${escapeHtml(s)}</span>`).join('')}
    </div>
    ${grid}`;
}

function renderLocationTab(c){
  // 선택과목 교사(classroomData) + 공통수업 교사(scheduleData) 합집합
  const teacherSet = new Set();
  classroomData.forEach(cr => { if(cr.teacher) teacherSet.add(cr.teacher); });
  scheduleData.forEach(r => { if(r.teacher) teacherSet.add(r.teacher); });
  const teachers = [...teacherSet].sort();
  const rooms = [...new Set(classroomData.map(c=>c.room).filter(Boolean))].sort();

  c.innerHTML = `
    <div style="text-align:center;margin-bottom:28px;">
      <h2 style="font-weight:900;margin-bottom:14px;font-size:26px;">📍 수업 장소 통합 검색</h2>
      <p style="color:var(--text-muted);font-size:13px;font-weight:600;margin-bottom:14px;">교사, 학생, 과목명 아무거나 입력하세요</p>
      <div class="search-wrapper no-print" style="margin:0 auto 14px;">
        <span class="search-icon">🏫</span>
        <input type="text" id="locSearch" class="search-input" placeholder="교사, 과목, 학생 이름 검색...">
      </div>
      <div class="filter-bar no-print" style="justify-content:center;">
        <div>
          <label>🧑‍🏫 교사로 찾기</label>
          <select id="locTeacher">
            <option value="">— 선택 —</option>
            ${teachers.map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>🏫 교실로 찾기</label>
          <select id="locRoom">
            <option value="">— 선택 —</option>
            ${rooms.map(r=>`<option value="${escapeHtml(r)}">${escapeHtml(r)}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div id="locResult" class="grid-layout"></div>`;

  const qEl = document.getElementById('locSearch');
  const tEl = document.getElementById('locTeacher');
  const rEl = document.getElementById('locRoom');

  const runFree = debounce(()=>{ tEl.value=''; rEl.value=''; doLocSearch(qEl.value.trim().toLowerCase(), 'free'); }, 150);
  qEl.addEventListener('input', runFree);
  tEl.addEventListener('change', ()=>{ if(tEl.value){ qEl.value=''; rEl.value=''; doLocSearch(tEl.value.toLowerCase(), 'teacher'); } });
  rEl.addEventListener('change', ()=>{ if(rEl.value){ qEl.value=''; tEl.value=''; doLocSearch(rEl.value.toLowerCase(), 'room'); } });
}

function doLocSearch(q, mode){
  const rd = document.getElementById('locResult');
  if(!rd) return;
  if(!q){ rd.innerHTML = ''; return; }
  let results = [];

  if(mode === 'free' || !mode){
    allStudents.filter(s=>s.name.toLowerCase().includes(q) || s.id.includes(q)).forEach(s=>{
      Object.entries(s.subjects).forEach(([sj,sl])=>{
        const ci = findClassroom(s.grade, sl, sj) || {};
        results.push({
          key:`S|${s.id}|${sl}|${sj}`,
          badge:`👨‍🎓 ${s.name} (${s.id}·${s.grade})`,
          slot:sl, subj:sj,
          teacher:ci.teacher||'미정', room:ci.room||'미정',
          color:'var(--accent)',
          _grade: s.grade, _studentId: s.id
        });
      });
    });
  }

  classroomData.filter(c=>{
    const teacher = (c.teacher||'').toLowerCase();
    const subject = (c.subject||'').toLowerCase();
    const room = (c.room||'').toLowerCase();
    if(mode==='teacher') return teacher === q;
    if(mode==='room') return room === q;
    return teacher.includes(q) || subject.includes(q) || room.includes(q);
  }).forEach(c=>{
    const k = `C|${c.grade}|${c.slot}|${c.subject}`;
    if(!results.find(r=>r.key===k)){
      results.push({
        key:k,
        badge:`📚 [${c.grade}] 강좌 · ${c.count||0}명`,
        slot:c.slot, subj:c.subject,
        teacher:c.teacher||'미정', room:c.room||'미정',
        color:'var(--violet)',
        _grade: c.grade
      });
    }
  });

  // 공통수업 검색 (scheduleData에서 슬롯 없는 수업)
  // 교사·과목·반 조합 단위로 중복 제거하여 한 카드로 표시
  const commonMap = new Map();
  scheduleData.filter(r=>{
    if(r.slot) return false;  // 선택과목은 classroomData에서 이미 처리
    if(!r.subject || r.subject === '자율활동' || r.subject === '자습') return false;
    const teacher = (r.teacher||'').toLowerCase();
    const subject = (r.subject||'').toLowerCase();
    if(mode==='teacher') return teacher === q;
    if(mode==='room') return false;  // 공통수업은 교실 정보 없음
    return teacher.includes(q) || subject.includes(q);
  }).forEach(r=>{
    const key = `K|${r.grade}|${r.ban}|${r.subject}|${r.teacher}`;
    if(!commonMap.has(key)){
      commonMap.set(key, { grade:r.grade, ban:r.ban, subject:r.subject, teacher:r.teacher, hours:1 });
    } else {
      commonMap.get(key).hours++;
    }
  });
  [...commonMap.values()].forEach(c=>{
    results.push({
      key: `K|${c.grade}-${c.ban}|${c.subject}|${c.teacher}`,
      badge: `🏫 [${c.grade}학년 ${c.ban}반] 공통 · 주 ${c.hours}시간`,
      slot: '공통',
      subj: c.subject,
      teacher: c.teacher || '미정',
      room: '교실에서 수업',
      color: '#10b981',
      _grade: c.grade, _ban: c.ban
    });
  });

  if(!results.length){
    rd.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;background:var(--surface);border-radius:16px;font-weight:800;color:var(--text-muted);border:1px solid var(--border);">😢 "${escapeHtml(q)}" 결과 없음</div>`;
    return;
  }

  let h = `<div style="grid-column:1/-1;font-weight:800;margin-bottom:6px;">총 <span style="color:var(--accent);">${results.length}건</span></div>`;
  results.forEach(r=>{
    const isCommon = r.slot === '공통';
    const slotLabel = isCommon
      ? `<span class="badge" style="font-size:12px;background:#d1fae5;color:#065f46;border-color:#6ee7b7;">공통</span>`
      : `<span class="badge" style="font-size:12px;" data-nav="slot" data-arg1="${escapeHtml(r.grade||'')}" data-arg2="${escapeHtml(r.slot)}">슬롯 ${escapeHtml(r.slot)}</span>`;
    const roomLine = r.room === '교실에서 수업'
      ? `<div style="display:inline-block;padding:4px 11px;border-radius:8px;background:${r.color}15;color:${r.color};font-weight:800;margin-top:4px;font-size:14px;">📍 각 반 교실</div>`
      : `<div style="display:inline-block;padding:4px 11px;border-radius:8px;background:${r.color}15;color:${r.color};font-weight:800;margin-top:4px;font-size:14px;">📍 ${escapeHtml(r.room)}</div>`;

    // 과목 네비: 선택과목은 명렬표, 공통은 해당 반별 조회
    let subjAttrs = '';
    if(isCommon && r._grade && r._ban){
      subjAttrs = `data-nav="class" data-arg1="${escapeHtml(r._grade)}" data-arg2="${escapeHtml(r._ban)}"`;
    } else if(!isCommon && r._grade && r.slot){
      subjAttrs = `data-nav="roster" data-arg1="${escapeHtml(r._grade)}" data-arg2="${escapeHtml(r.slot)}" data-arg3="${escapeHtml(r.subj)}"`;
    }
    // 학생 배지 네비
    let badgeAttrs = '';
    if(r._studentId) badgeAttrs = `data-nav="student" data-arg1="${escapeHtml(r._studentId)}"`;
    else if(isCommon && r._grade && r._ban) badgeAttrs = `data-nav="class" data-arg1="${escapeHtml(r._grade)}" data-arg2="${escapeHtml(r._ban)}"`;

    h += `
      <div class="card" style="border-top:4px solid ${r.color};padding:18px;">
        <div style="font-size:12px;font-weight:800;color:${r.color};margin-bottom:6px;" ${badgeAttrs}>${escapeHtml(r.badge)}</div>
        <div class="card-title" style="margin-bottom:10px;font-size:17px;">
          <span ${subjAttrs}>${escapeHtml(r.subj)}</span> ${slotLabel}
        </div>
        <div style="font-size:13px;color:var(--text-muted);font-weight:600;line-height:1.8;">
          <div>🧑‍🏫 <strong style="color:var(--text-main);" data-nav="teacher" data-arg1="${escapeHtml(r.teacher)}">${escapeHtml(r.teacher)}</strong></div>
          ${roomLine}
        </div>
      </div>`;
  });
  rd.innerHTML = h;
}
</script>
</body>
</html>
